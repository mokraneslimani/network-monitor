<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Network Monitoring Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="container-fluid dashboard">
        <header class="d-flex flex-column flex-lg-row justify-content-between align-items-lg-center gap-3 py-4">
            <div>
                <p class="text-uppercase text-info small mb-1">Real-time network security monitor</p>
                <h1 class="mb-0">Network Monitoring Dashboard</h1>
            </div>
            <div class="connection-card">
                <span id="connectionDot" class="connection-dot bg-danger"></span>
                <span id="connectionText">Disconnected</span>
            </div>
        </header>

        <section class="row g-4 mb-4">
            <div class="col-md-3">
                <div class="stat-card">
                    <span>Total devices</span>
                    <strong id="totalDevices">0</strong>
                </div>
            </div>
            <div class="col-md-3">
                <div class="stat-card">
                    <span>Online</span>
                    <strong id="onlineDevices">0</strong>
                </div>
            </div>
            <div class="col-md-3">
                <div class="stat-card alert-stat">
                    <span>High risk</span>
                    <strong id="highRiskDevices">0</strong>
                </div>
            </div>
            <div class="col-md-3">
                <div class="stat-card alert-stat">
                    <span>Alerts</span>
                    <strong id="totalAlerts">0</strong>
                </div>
            </div>
        </section>

        <section class="row g-4 mb-4">
            <div class="col-lg-4">
                <div class="panel h-100">
                    <h2 class="h5 mb-3">New devices</h2>
                    <div id="addedDevices" class="event-list"></div>
                </div>
            </div>
            <div class="col-lg-4">
                <div class="panel h-100">
                    <h2 class="h5 mb-3">Removed devices</h2>
                    <div id="removedDevices" class="event-list"></div>
                </div>
            </div>
            <div class="col-lg-4">
                <div class="panel h-100">
                    <h2 class="h5 mb-3">Security alerts</h2>
                    <div id="alertsList" class="event-list"></div>
                </div>
            </div>
        </section>

        <section class="row g-4">
            <div class="col-xl-7">
                <div class="panel">
                    <div class="d-flex justify-content-between align-items-center mb-3">
                        <h2 class="h5 mb-0">Live devices</h2>
                        <span id="lastUpdate" class="text-secondary small">Waiting for data...</span>
                    </div>

                    <div class="table-responsive">
                        <table class="table table-dark table-hover align-middle">
                            <thead>
                                <tr>
                                    <th>IP</th>
                                    <th>Hostname</th>
                                    <th>Vendor</th>
                                    <th>Status</th>
                                    <th>Latency</th>
                                    <th>Open ports</th>
                                    <th>Risk</th>
                                </tr>
                            </thead>
                            <tbody id="devicesTable"></tbody>
                        </table>
                    </div>
                </div>
            </div>

            <div class="col-xl-5">
                <div class="panel">
                    <h2 class="h5 mb-3">Latency per device</h2>
                    <canvas id="latencyChart"></canvas>
                </div>
            </div>
        </section>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="/static/app.js"></script>
</body>
</html>
